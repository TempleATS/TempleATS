services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temple
      POSTGRES_PASSWORD: temple
      POSTGRES_DB: temple_ats
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temple"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://temple:temple@db:5432/temple_ats?sslmode=disable
      JWT_SECRET: change-me-to-a-random-secret
      PORT: "8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
